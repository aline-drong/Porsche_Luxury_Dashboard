fill('y','ModelYearSanitized');

function count(arr,key){
let o={};
arr.forEach(x=>o[x[key]]=(o[x[key]]||0)+1);

}

function render(arr){

let a=count(arr,'PorscheModelSanitized'), b=count(arr,'ModelYearSanitized'), c=count(arr,'CitySanitized'), d=count(arr,'PayMethodSanitized');

function max(o){return Object.keys(o).sort((x,y)=>o[y]-o[x])[0]||'-'}

ty.innerHTML=max(b);
tc.innerHTML=max(c);
tp.innerHTML=max(d);

if(charts.m) charts.m.destroy();
if(charts.c) charts.c.destroy();

charts.c=new Chart(chartCity,{type:'doughnut',data:{labels:Object.keys(c),datasets:[{data:Object.values(c)}]}});
}

(!c.value||x['CitySanitized']==c.value)&&
(!p.value||x['PayMethodSanitized']==p.value));
render(f);
}
